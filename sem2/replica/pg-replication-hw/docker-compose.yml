version: '3.9'

services:
  pg-master:
    image: postgres:16
    container_name: pg-master
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football
    ports:
      - "5433:5432"
    volumes:
      - ./master/data:/var/lib/postgresql/data
    networks:
      - pgnet

  pg-replica1:
    image: postgres:16
    container_name: pg-replica1
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football
    ports:
      - "5434:5432"
    volumes:
      - ./replica1/data:/var/lib/postgresql/data
    networks:
      - pgnet
    depends_on:
      - pg-master

  pg-replica2:
    image: postgres:16
    container_name: pg-replica2
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football
    ports:
      - "5435:5432"
    volumes:
      - ./replica2/data:/var/lib/postgresql/data
    networks:
      - pgnet
    depends_on:
      - pg-master

networks:
  pgnet: